<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <script>
      // SPA redirect for GitHub Pages
      // Converts path to query string so index.html can restore the route
      var seg = location.pathname.split('/').filter(Boolean);
      var repo = 'ton-wallet-dapp';
      var repoIndex = seg.indexOf(repo);
      var path = '/' + seg.slice(repoIndex + 1).join('/');
      location.replace(
        '/' + repo + '/?route=' + encodeURIComponent(path + location.search)
      );
    </script>
  </head>
</html>
